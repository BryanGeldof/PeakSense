title: PeakSense Test Dashboard
views:
  - title: PeakSense
    path: peaksense-test
    icon: mdi:lightning-bolt
    
    cards:
      # Header
      - type: markdown
        content: |
          # ⚡ PeakSense Test Dashboard
          Volledig test dashboard voor PeakSense integratie

      # Current Status
      - type: vertical-stack
        cards:
          - type: entities
            title: 📊 Huidige Status
            show_header_toggle: false
            entities:
              - entity: sensor.peaksense_last_event
                name: Laatste Piek (W)
              - entity: sensor.peaksense_status
                name: Status
              - attribute: sensor.peaksense_last_event|average_w
                name: Gemiddeld (W)
              - attribute: sensor.peaksense_last_event|duration_samples
                name: Duur (samples)
              - attribute: sensor.peaksense_last_event|start
                name: Start Tijd
              - attribute: sensor.peaksense_last_event|label
                name: Label

      # Statistics
      - type: grid
        columns: 2
        cards:
          - type: statistic
            entity: sensor.peaksense_last_event
            stat_type: max
            period: day
            title: Max Piek Vandaag (W)

          - type: statistic
            entity: sensor.peaksense_last_event
            stat_type: mean
            period: day
            title: Gem. Piek Vandaag (W)

      # Test Buttons
      - type: vertical-stack
        title: 🧪 Test Service Calls
        cards:
          - type: markdown
            content: |
              Klik de knoppen hieronder om pieken te simuleren:
              - **900W** = klein toestel (bv. waterkoker)
              - **1200W** = medium toestel (bv. haarföhn)
              - **1500W** = groot toestel (bv. oven)

          - type: button
            name: Test 900W (Waterkoker)
            icon: mdi:water-boiler
            action_type: call-service
            service: peaksense.update
            service_data:
              value: 900

          - type: button
            name: Test 1200W (Haarföhn)
            icon: mdi:hair-dryer
            action_type: call-service
            service: peaksense.update
            service_data:
              value: 1200

          - type: button
            name: Test 1500W (Oven)
            icon: mdi:oven
            action_type: call-service
            service: peaksense.update
            service_data:
              value: 1500

          - type: button
            name: Test Einde Piek (300W)
            icon: mdi:power-off
            action_type: call-service
            service: peaksense.update
            service_data:
              value: 300

      # Labeling Section
      - type: vertical-stack
        title: 🏷️ Pieken Labelen
        cards:
          - type: markdown
            content: |
              ## Piek Labelen via Service
              
              Vul de event ID in die je wilt labelen (zie hierboven onder "Recente pieken").
              
              Voorbeelden:
              - `Wasmachine`
              - `Oven`
              - `Vaatwasser`
              - `Elektrische douche`

          - type: entities
            entities:
              - input_text.peaksense_event_id
              - input_text.peaksense_label

          - type: button
            name: Label Opslaan
            icon: mdi:content-save
            action_type: call-service
            service: peaksense.label_event
            service_data:
              event_id: "{{ states('input_text.peaksense_event_id') | int }}"
              label: "{{ states('input_text.peaksense_label') }}"

      # Info Section
      - type: markdown
        content: |
          ## 📋 Hoe te gebruiken

          ### 1. Test starten
          - Klik een test knop (900W, 1200W, etc.)
          - Daarna klik "Test Einde Piek (300W)"
          - Een piek wordt gedetecteerd en opgeslagen

          ### 2. Piek Labelen
          - Kijk in Developer Tools → States → `sensor.peaksense_last_event`
          - Zie de `id` in de event
          - Vul in: Event ID + Label
          - Klik "Label Opslaan"

          ### 3. Echte Data
          - Maak een automation die je power meter uitleest
          - Stuur waarden naar `peaksense.update`
          - Pieken verschijnen automatisch in het dashboard

          ## 🔧 Debug
          - **Settings → System → Logs** → Zoek `peaksense`
          - **Developer Tools → States** → Zoek `sensor.peaksense`
          - **Developer Tools → Services** → Test `peaksense.update` manueel

          ## 📊 Drempelwaarden
          - **Start:** 800W (piek begint)
          - **Einde:** 300W (piek eindigt)
          - Aanpassen in `detector.py` als nodig
