title: PeakSense
views:
  - title: PeakSense
    path: peaksense
    badges:
      - entity: sensor.peaksense_status
      - entity: sensor.peaksense_last_event
    cards:
      # Header
      - type: markdown
        content: |
          # ⚡ PeakSense
          Label pieken om het systeem te trainen welk toestel wat verbruikt.

      # Huidige piek status
      - type: vertical-stack
        cards:
          - type: entities
            title: Huidige piek
            show_header_toggle: false
            entities:
              - entity: sensor.peaksense_last_event
                name: Piek (W)
              - entity: sensor.peaksense_status
                name: Status
              - attribute: sensor.peaksense_last_event|average_w
                name: Gemiddeld (W)
              - attribute: sensor.peaksense_last_event|duration_samples
                name: Duur (samples)
              - attribute: sensor.peaksense_last_event|start
                name: Start tijd
              - attribute: sensor.peaksense_last_event|label
                name: Label

      # Grafiek met history (alleen met history-stats card)
      - type: statistic
        entities:
          - sensor.peaksense_last_event
        stat_type: mean
        period: day

      # Test buttons
      - type: vertical-stack
        title: Test en Debug
        cards:
          - type: button
            name: 📊 Test piek (900W)
            action_type: call-service
            service: peaksense.update
            service_data:
              value: 900

          - type: button
            name: 📊 Test piek (1200W)
            action_type: call-service
            service: peaksense.update
            service_data:
              value: 1200

          - type: button
            name: 📊 Test piek (1500W)
            action_type: call-service
            service: peaksense.update
            service_data:
              value: 1500

      # Instructies
      - type: markdown
        content: |
          ## Setup checklist

          - [ ] Integratie PeakSense ingesteld via Settings → Integrations
          - [ ] Automation gemaakt die waarden naar `peaksense.update` stuurt
          - [ ] Sensors zichtbaar (`sensor.peaksense_last_event`, `sensor.peaksense_status`)
          - [ ] Test service calls werken (knoppen hierboven)

          ## Volgende stappen

          1. Maak automation die je power meter uitleest
          2. Laat enkele pieken detecteren (druk test knoppen)
          3. Label pieken in Developer Tools → Services:
             - Service: `peaksense.label_event`
             - Data: `{"event_id": 1, "label": "Oven"}`
          4. Systeem gaat pieken voorspellen
