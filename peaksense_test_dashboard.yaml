title: PeakSense Dashboard
views:
  - title: PeakSense
    path: peaksense
    icon: mdi:lightning-bolt
    badges:
      - entity: sensor.peaksense_status
        icon: mdi:pulse
      - entity: sensor.peaksense_last_event
        icon: mdi:lightning-bolt
    cards:
      # Header
      - type: markdown
        content: |
          # ⚡ PeakSense Dashboard
          Detecteer en label stroompieken automatisch

      # Current Peak Information
      - type: vertical-stack
        cards:
          - type: entities
            title: Huidige Piek
            show_header_toggle: false
            entities:
              - entity: sensor.peaksense_last_event
                name: Piekwaarde (W)
              - entity: sensor.peaksense_status
                name: Status

          - type: custom:button-card
            entity: sensor.peaksense_last_event
            name: Piek Gegevens
            show_state: true
            show_label: true
            label: |
              [[[
                const state = entity.state;
                const avg = entity.attributes.average_w;
                const duration = entity.attributes.duration_samples;
                const start = entity.attributes.start;
                return `Gem: ${avg}W | Duur: ${duration}s`;
              ]]]
            styles:
              card:
                - background-color: rgba(167, 139, 250, 0.1)
                - border: 2px solid rgba(167, 139, 250, 0.3)
              name:
                - font-size: 14px
                - color: rgb(167, 139, 250)
              label:
                - font-size: 12px
                - color: rgb(136, 136, 136)

      # Statistics
      - type: vertical-stack
        title: Statistieken
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Laatste Piek
                show_state: true
                entity: sensor.peaksense_last_event
                styles:
                  card:
                    - background-color: rgba(167, 139, 250, 0.1)
                    - border: 1px solid rgba(167, 139, 250, 0.2)
                  state:
                    - font-size: 20px
                    - color: rgb(167, 139, 250)

              - type: custom:button-card
                name: Status
                show_state: true
                entity: sensor.peaksense_status
                state:
                  - value: active
                    icon: mdi:pulse
                    styles:
                      card:
                        - background-color: rgba(74, 222, 128, 0.1)
                        - border: 1px solid rgba(74, 222, 128, 0.3)
                      state:
                        - color: rgb(74, 222, 128)
                  - value: idle
                    icon: mdi:sleep
                    styles:
                      card:
                        - background-color: rgba(100, 100, 100, 0.1)
                        - border: 1px solid rgba(100, 100, 100, 0.2)
                      state:
                        - color: rgb(150, 150, 150)

      # Test Section
      - type: vertical-stack
        title: Test & Debug
        cards:
          - type: markdown
            content: |
              **Stuur test waarden naar PeakSense om het systeem te testen.**
              
              - 900W + 300W = korte piek
              - 1200W + 300W = medium piek  
              - 1500W + 300W = lange piek

          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Test 900W
                tap_action:
                  action: call-service
                  service: peaksense.update
                  service_data:
                    value: 900
                icon: mdi:lightning-bolt
                styles:
                  card:
                    - background-color: rgba(167, 139, 250, 0.2)
                    - border: 1px solid rgb(167, 139, 250)

              - type: custom:button-card
                name: Test 1200W
                tap_action:
                  action: call-service
                  service: peaksense.update
                  service_data:
                    value: 1200
                icon: mdi:lightning-bolt
                styles:
                  card:
                    - background-color: rgba(167, 139, 250, 0.2)
                    - border: 1px solid rgb(167, 139, 250)

              - type: custom:button-card
                name: Test 1500W
                tap_action:
                  action: call-service
                  service: peaksense.update
                  service_data:
                    value: 1500
                icon: mdi:lightning-bolt
                styles:
                  card:
                    - background-color: rgba(167, 139, 250, 0.2)
                    - border: 1px solid rgb(167, 139, 250)

          - type: custom:button-card
            name: Test - Einde Piek (300W)
            tap_action:
              action: call-service
              service: peaksense.update
              service_data:
                value: 300
            icon: mdi:stop-circle
            styles:
              card:
                - background-color: rgba(239, 68, 68, 0.1)
                - border: 1px solid rgb(239, 68, 68)

      # Manual Label Test
      - type: vertical-stack
        title: Piek Labelen (Test)
        cards:
          - type: markdown
            content: |
              **Handmatig een piek labelen (voor testen)**
              
              Voer een event_id in (meestal 1 voor de eerste piek) en een label.

          - type: horizontal-stack
            cards:
              - type: custom:button-card
                name: Label Event #1 als "Wasmachine"
                tap_action:
                  action: call-service
                  service: peaksense.label_event
                  service_data:
                    event_id: 1
                    label: "Wasmachine"
                icon: mdi:tag
                styles:
                  card:
                    - background-color: rgba(34, 197, 94, 0.1)
                    - border: 1px solid rgb(34, 197, 94)

              - type: custom:button-card
                name: Label Event #1 als "Oven"
                tap_action:
                  action: call-service
                  service: peaksense.label_event
                  service_data:
                    event_id: 1
                    label: "Oven"
                icon: mdi:tag
                styles:
                  card:
                    - background-color: rgba(34, 197, 94, 0.1)
                    - border: 1px solid rgb(34, 197, 94)

      # Information
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 📚 Hoe te gebruiken

              ### 1. Automation Setup
              Zorg dat je een automation hebt die je power meter uitleest:
              ```yaml
              alias: Feed power to PeakSense
              trigger:
                - platform: state
                  entity_id: sensor.YOUR_POWER_METER
              action:
                - service: peaksense.update
                  data:
                    value: "{{ states('sensor.YOUR_POWER_METER') | float }}"
              mode: queued
              ```

              ### 2. Pieken Detecteren
              - PeakSense detecteert pieken boven **800W**
              - Pieken eindigen onder **300W**
              - Gedetecteerde piek verschijnt hier in het dashboard

              ### 3. Pieken Labelen
              - Type een label in je automation of gebruik Services
              - Het systeem leert welk toestel welke piek veroorzaakt
              - Na ~5-10 labels kan het gaan voorspellen

              ### 4. Testen
              - Gebruik de test knoppen hierboven
              - Of roep handmatig `peaksense.update` service aan
              - Controleer `sensor.peaksense_last_event` en `sensor.peaksense_status`

          - type: markdown
            content: |
              ## 🔧 Services

              ### peaksense.update
              Stuurt een waarde naar PeakSense
              ```yaml
              service: peaksense.update
              data:
                value: 1200
              ```

              ### peaksense.label_event
              Labelt een gedetecteerde piek
              ```yaml
              service: peaksense.label_event
              data:
                event_id: 5
                label: "Wasmachine"
              ```

          - type: markdown
            content: |
              ## 📊 Data
              
              - **Database:** `/config/peaksense.db` (SQLite)
              - **Pieken:** Automatisch opgeslagen
              - **Labels:** Via service call toevoegen
              - **API:** GET `/api/peaksense/events`

              Veel sterkte! ⚡
